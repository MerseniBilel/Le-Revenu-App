name: lerevenu
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.2.0
  dartz: ^0.10.1
  injectable: ^2.7.1
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.3.0
  forge_annotation: ^0.0.1
  dio: ^5.7.0
  go_router: ^17.3.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  sizer: ^3.1.3
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.6
dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.11.0
  freezed: ^3.2.3
  go_router_builder: ^4.1.1
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env.development
    - .env.production
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay.ttf
    
flutter_gen:
  output: lib/core/gen/
  line_length: 80
  integrations:
    flutter_svg: true
  
  colors:
    enabled: true
    outputs:
      class_name: AppColors
    inputs:
      - assets/color/colors.xml
      - assets/color/dark_colors.xml
  assets:
    exclude:
      - .env.development
      - .env.production
